[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm@9 && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps artifacts/api-server/dist/bot-entry.mjs"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[nixpacks]
nixPackages = ["nodejs_22"]
